<!DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="UTF-8">
	<title>Chronicles Editor</title>
	<link rel="icon" type="image/png" href="./src/Images/UI/editor/editor_icon.png" />
	<meta
		name="viewport"
		content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0"
	/>
	<style>
    :root{
      --main-editor-color: 128, 128, 128;
      --main-font-size: 18px
    }
    * {
      font-family: SansSerif, sans-serif;
      font-size: var(--main-font-size);
    }

    html{
      scroll-behavior: smooth;
    }

    body{
      background-size: 40px 40px;
      background-image:
              linear-gradient(to right, rgba(var(--main-editor-color), 1) 1px, transparent 1px),
              linear-gradient(to bottom, rgba(var(--main-editor-color), 1) 1px, transparent 1px);
      background-attachment: fixed;
    }

    button, a{
      border: 0;
      padding: 10px;
      margin: 0;
      cursor: pointer;
      border-radius: 15px;
      text-decoration: none;
      transition: all 0.2s ease-in-out;
    }

    button:disabled{
      filter: brightness(70%);
      cursor: no-drop;
    }

    button:disabled:hover{
      background-color: transparent;
    }

    label{
      margin: 5px 0 5px 0;
      padding: 0 0 2px 5px;
      border-bottom: 1px solid rgba(var(--main-editor-color), 1);
    }

    input{
      border: 0;
      border-radius: 15px;
      max-width: 250px;
      padding: 10px;
      background-color: rgba(var(--main-editor-color), 0.2);
    }

    select {
      border: 0;
      border-radius: 15px;
      max-width: 270px;
      padding: 10px;
      background-color: rgba(var(--main-editor-color), 0.2);
      cursor: pointer;
    }

    textarea{
      border: 1px solid #757575;
      border-radius: 15px;
      padding: 10px;
      box-shadow: rgba(0, 0, 0, 0.25) 0 0 15px;
    }

    hr{
      width: 90%;
      border: none;
      border-top: 1px solid rgba(255, 255, 255, 0.2);
    }

    #uploadInput{
      display: none;
    }

    #gammaInput{
      justify-self: right;
      width: 25px;
      height: 25px;
      padding: 0;
      margin: 0 0 0 auto;
    }

    #fontSizeInput{
      background-color: white;
      color: black;
      width: 50px;
      margin: 0 0 0 auto;
    }

    #scenarioToTransform, #chatsToTransform{
      width: 250px;
      height: 250px;
    }

    .toolbar-menu{
      position: fixed;
      display: flex;
      flex-direction: row;
      justify-content: left;
      left: 0;
      right: 0;
      top: 0;
      background-color: rgba(var(--main-editor-color), 1);
      padding: 5px;
      box-shadow: rgba(0, 0, 0, 0.25) 0 0 15px;
    }

    .toolbar-button{
      position: relative;
    }

    .toolbar-button:hover>.toolbar-category{
      opacity: 1;
      visibility: visible;
      top: 45px;
    }

    .toolbar-button:hover > .sub-menu {
      opacity: 1;
      visibility: visible;
      top: 0;
    }

    .toolbar-category-opener{
      display: flex;
      align-items: center;
      justify-content: left;
      text-align: center;
      margin: 0;
      border-radius: 15px;
      color: white;
      background-color: transparent;
    }

    .toolbar-category-opener:hover{
      background-color: rgba(0, 0, 0, 0.15);
    }

    .toolbar-category-opener:hover .toolbar-category{
      background-color: rgba(0, 0, 0, 0.15);
    }

    .toolbar-category:hover{
      opacity: 1;
      visibility: visible;
    }

    .toolbar-category{
      position: absolute;
      top: -50%;
      left: 0;
      display: flex;
      flex-direction: column;
      visibility: hidden;
      opacity: 0;
      background-color: rgba(var(--main-editor-color), 1);
      padding: 5px;
      border-radius: 0 0 15px 15px;
      min-width: 250px;
      box-shadow: rgba(0, 0, 0, 0.25) 5px 10px 10px;
      transition: all .2s ease-in-out;
    }

    .sub-menu {
      top: 0;
      left: 100%;
      border-radius: 15px;
      box-shadow: rgba(0, 0, 0, 0.25) 5px 5px 10px;
    }

    .toolbar-category-button{
      display: flex;
      align-items: center;
      justify-content: left;
      text-align: left;
      border-radius: 15px;
      background-color: transparent;
      color: white;
    }

    .toolbar-category-button:hover{
      background-color: rgba(0, 0, 0, 0.15);
    }

    .toolbar-category-button> input{

    }

    .blueprint{
      padding: 50px 0;
    }

    .storyInfo{
      opacity: 0;
      visibility: hidden;
      display: flex;
      flex-direction: row;
      flex-wrap: wrap;
      border-radius: 15px;
      padding: 10px;
      max-width: fit-content;
      gap: 10px;
    }

    .storyInfo-block{
      display: flex;
      flex-direction: column;
      background-color: white;
      border-radius: 15px;
      padding: 10px;
      box-shadow: rgba(0, 0, 0, 0.25) 0 0 15px;
    }

    .slides{
      margin: 10px 0 0 0;
      gap: 10px;
      display: flex;
      flex-direction: column;
    }

    .slide{

    }

    .toTransformScenarioWindow, .toTransformChatsWindow{
      position: fixed;
      display: flex;
      opacity: 0;
      visibility: hidden;
      align-items: center;
      justify-content: center;
      top: 0;
      right: 0;
      bottom: 0;
      left: 0;
      background-color: rgba(0, 0, 0, 0.2);
      transition: all .5s ease-in-out;
    }

    .fullscreenWindow{
      position: fixed;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      top: 0;
      right: 0;
      bottom: 0;
      left: 0;
      background-color: rgba(0, 0, 0, 0.2);
      transition: all .5s ease-in-out;
    }

    .fullscreenBlock{
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 10px;
      justify-content: center;
      background-color: white;
      border-radius: 15px;
      box-shadow: rgba(0, 0, 0, 0.25) 0 0 15px;
    }

    .generator-block {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 10px 15px;
      align-items: center;
      min-width: 500px;
    }

    .generator-block > h3 {
      grid-column: 1 / -1;
      text-align: center;
      margin: 5px 0 15px 0;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(0,0,0,0.1);
    }

    .generator-block > label {
      border-bottom: none;
      justify-self: end;
    }

    .wardrobe-items-container {
      grid-column: 1 / -1;
      display: flex;
      flex-direction: column;
      gap: 15px;
      max-height: 40vh;
      overflow-y: auto;
      padding: 5px;
    }

    .wardrobe-item-block {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 10px 15px;
      align-items: center;
      padding: 15px;
      border-radius: 10px;
      background-color: rgba(0, 0, 0, 0.05);
      border: 1px solid rgba(0, 0, 0, 0.1);
    }

    .add-item-button {
      grid-column: 1 / -1;
      justify-self: center;
    }

    .generator-block > button {
      grid-column: 1 / -1;
      justify-self: center;
      width: 50%;
    }

    .returnButton{
      position: fixed;
      right: 15px;
      bottom: 15px;
      border-radius: 50px;
      width: 50px;
      height: 50px;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 50px;
      background-color: white;
      box-shadow: rgba(0, 0, 0, 0.25) 0 0 15px;
    }

    .returnButton>img{
      width: 60px;
      height: 60px;
    }

    .span_icon{
      width: 25px;
      height: 25px;
      margin: 0 10px 0 0;
    }

    .context-menu{
      position: fixed;
      display: flex;
      flex-direction: column;
      background-color: rgba(var(--main-editor-color), 1);
      padding: 5px;
      border-radius: 15px;
      gap: 5px;
      min-width: 200px;
      box-shadow: rgba(0, 0, 0, 0.25) 5px 10px 10px;
      transition: all .2s ease-in-out;
    }

    .full-width-submenu-container {
      display: contents; /* Allows children to be direct flex items of the parent */
    }

    ::-webkit-scrollbar {
      width: 10px;
      height: 0;
      background-color: rgba(var(--main-editor-color), 1);
      box-shadow: rgba(0, 0, 0, 0.25) 0 0 15px;
    }

    ::-webkit-scrollbar-track {
      background: rgba(var(--main-editor-color), 1);
      border-radius: 15px;
    }

    ::-webkit-scrollbar-thumb {
      background: white;
      border-radius: 15px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.8);
    }
	</style>
</head>

      FR.readAsText(uploadInput.files[uploadInput.files.length-1])

    uploadButton.onclick = () => {

      transformWindow.style.opacity = '0'

      replaceWindow.style.opacity = '0'
      replaceWindow.style.visibility = 'hidden'

    [Идентификатор]: НОМЕР_СЛАЙДА,
    [Текст]:
      \`
        ТЕКСТ_СЛАЙДА
      \`,
    [Кнопки слайда]: [
      {
        [Текст]: '',
        [Переход на слайд]: НОМЕР_СЛАЙДА
      }],
    [Фон]: файл('../../../../Media/Images/КОД_ИСТОРИИ/Backgrounds/НАЗВАНИЕ.jpg')
  }
`
      newSlide.classList.add('slide')
      slidesField.appendChild(newSlide)
      newSlide.style.height = '5px'
      newSlide.style.height = newSlide.scrollHeight + 'px'
    }

    findSlideButton.onclick = () => {
      slideNumberToFind.value = ''
      findWindow.style.opacity = '1'
      findWindow.style.visibility = 'visible'
    }

    doFindButton.onclick = () => {
      findWindow.style.opacity = '0'
      findWindow.style.visibility = 'hidden'
      window.location.href = `#slide_${slideNumberToFind.value}`
    }

    gammaColor.oninput = () => {
      const rgbColor = hexToRgb(gammaColor.value)
      cssVariables.style.setProperty('--main-editor-color', `${rgbColor}`)
      localStorage.setItem('UIColor', rgbColor)
    }

    recentButton.onclick = () => {
      currentFile = localStorage.getItem('recentFile')
      enableButtons()
      makeStructure()

      showInput.value = ''
    }

    showInput.onchange = () => {
      showWindow.style.opacity = '0'
      showWindow.style.visibility = 'hidden'
      openGHRawFile(showInput.value)
    }

    moveButton.onclick = () => {
      moveWindow.style.opacity = '1'
      moveWindow.style.visibility = 'visible'
      moveWhatInput.value = ''
      moveWhereInput.value = ''
    }

    doMoveButton.onclick = () => {
      let allSlides = Array.from(slidesField.querySelectorAll('.slide'))
      let whatIndex = 0
      let whereIndex = 0
      allSlides.forEach((slide, index) => {
        slide.id.split('_')[1] === moveWhatInput.value && (whatIndex = index)
        slide.id.split('_')[1] === moveWhereInput.value && (whereIndex = index)
      })
      allSlides.splice(whereIndex, 0, allSlides.splice(whatIndex, 1)[0])
      slidesField.innerHTML = ''
      allSlides.forEach(slide => {
        slidesField.appendChild(slide)

      })
      moveWindow.style.opacity = '0'
      moveWindow.style.visibility = 'hidden'
    }

    fontSizeInput.oninput = () => {
      cssVariables.style.setProperty('--main-font-size', `${fontSizeInput.value}px`)
      localStorage.setItem('fontSize', fontSizeInput.value)
    }

    manageAchievement.onclick = async () => {
      try {
        [achievementFileHandle] = await window.showOpenFilePicker({ types: [{ description: 'JavaScript Files', accept: { 'text/javascript': ['.js', '.ts'] } }] });
        const file = await achievementFileHandle.getFile();
        const fileContent = await file.text();
        const entryRegex = /achievementsManager\.add\({[\s\S]*?}\)/g;
        const matches = fileContent.match(entryRegex);
        achievementEntries = [];
        if (matches) {
          achievementEntries = matches.map((entry, index) => {
            const getValue = (key) => (entry.match(new RegExp(`${key}: '([^']*)'`)) || [])[1] || '';
            return { original: entry, name: getValue('name'), title: getValue('title'), text: getValue('text'), index };
          });
        }
        achievementEntrySelect.innerHTML = '<option value="-1">--- Создать новое достижение ---</option>' + achievementEntries.map(e => `<option value="${e.index}">${e.title} (${e.name})</option>`).join('');
        achievementEntrySelect.onchange();
        achievementGeneratorWindow.style.opacity = '1';
        achievementGeneratorWindow.style.visibility = 'visible';
      } catch (err) {
        if (err.name !== 'AbortError') console.error(err.name, err.message);
      }
    }

    achievementGeneratorWindow.onclick = (e) => {
      if (e.target === achievementGeneratorWindow) {
        achievementGeneratorWindow.style.opacity = '0'
        achievementGeneratorWindow.style.visibility = 'hidden'
      }
    }

    achievementEntrySelect.onchange = () => {
      const selectedIndex = achievementEntrySelect.value;
      if (selectedIndex < 0) {
        achievementStoryId.value = '';
        achievementId.value = '';
        achievementTitle.value = '';
        achievementDescription.value = '';
        achievementStoryId.readOnly = false;
        achievementId.readOnly = false;
      } else {
        const selected = achievementEntries[selectedIndex];
        const storyMatch = selected.original.match(/story: EStoriesEn\.([^,}]*)/);
        achievementStoryId.value = storyMatch ? storyMatch[1].trim() : '';
        achievementId.value = selected.name;
        achievementTitle.value = selected.title;
        achievementDescription.value = selected.text;
        achievementStoryId.readOnly = true;
        achievementId.readOnly = true;
      }
    }

    journalGeneratorWindow.onclick = (e) => {
      if (e.target === journalGeneratorWindow) {
        journalGeneratorWindow.style.opacity = '0';
        journalGeneratorWindow.style.visibility = 'hidden';
      }
    }

    manageWardrobe.onclick = async () => {
      try {
        [wardrobeFileHandle] = await window.showOpenFilePicker({ types: [{ description: 'JavaScript Files', accept: { 'text/javascript': ['.js', '.ts'] } }] });
        const file = await wardrobeFileHandle.getFile();
        const fileContent = await file.text();
        const entryRegex = /wardrobe\.addEntity\('([^']*)', \[\s*([\s\S]*?)\s*\]\)/g;
        wardrobeEntries = [];
        const matches = [...fileContent.matchAll(entryRegex)];
        if (matches.length > 0) {
          wardrobeEntries = matches.map((match, index) => {
            const itemsString = match[2];
            const itemRegex = /{\s*image: require\('..\/..\/Media\/Images\/([^/]+)\/([^']+)'\),\s*title: '([^']*)',\s*description: '([^']*)',\s*cost: '([^']*)'[\s\S]*?}/g;
            const items = [...itemsString.matchAll(itemRegex)].map(itemMatch => ({
              story: itemMatch[1],
              image: itemMatch[2],
              title: itemMatch[3],
              description: itemMatch[4],
              cost: itemMatch[5]
            }));
            return { original: match[0], id: match[1], items, index };
          });
        }
        wardrobeEntrySelect.innerHTML = '<option value="-1">--- Создать новый гардероб ---</option>' + wardrobeEntries.map(e => `<option value="${e.index}">${e.id}</option>`).join('');
        wardrobeEntrySelect.onchange();
        wardrobeGeneratorWindow.style.opacity = '1';
        wardrobeGeneratorWindow.style.visibility = 'visible';
      } catch (err) {
        if (err.name !== 'AbortError') console.error(err.name, err.message);
      }
    }

    wardrobeGeneratorWindow.onclick = (e) => {
      if (e.target === wardrobeGeneratorWindow) {
        wardrobeGeneratorWindow.style.opacity = '0'
        wardrobeGeneratorWindow.style.visibility = 'hidden'
      }
    }

    const renderWardrobeItems = (container, items, storyCode) => {
      container.innerHTML = '';
      items.forEach((item, itemIndex) => {
        const template = document.getElementById('wardrobeItemTemplate');
        const clone = template.content.cloneNode(true);
        clone.querySelector('.wardrobe-image').value = item.image;
        clone.querySelector('.wardrobe-title').value = item.title;
        clone.querySelector('.wardrobe-description').value = item.description;
        clone.querySelector('.wardrobe-cost').value = item.cost;
        const removeBtn = document.createElement('button');
        removeBtn.textContent = 'Удалить';
        removeBtn.onclick = () => {
          items.splice(itemIndex, 1);
          renderWardrobeItems(container, items, storyCode);
        };
        const itemBlock = clone.querySelector('.wardrobe-item-block');
        itemBlock.appendChild(removeBtn);
        container.appendChild(clone);
      });
    }

    wardrobeEntrySelect.onchange = () => {
      const selectedIndex = wardrobeEntrySelect.value;
      if (selectedIndex < 0) {
        wardrobeStoryCode.value = '';
        wardrobeId.value = '';
        wardrobeItemsContainer.innerHTML = '';
        wardrobeStoryCode.readOnly = false;
        wardrobeId.readOnly = false;
      } else {
        const selected = wardrobeEntries[selectedIndex];
        wardrobeId.value = selected.id;
        wardrobeStoryCode.value = selected.items[0]?.story || '';
        wardrobeId.readOnly = true;
        wardrobeStoryCode.readOnly = true;
        renderWardrobeItems(wardrobeItemsContainer, selected.items, wardrobeStoryCode.value);
      }
    }

    addWardrobeItemButton.onclick = () => {
      const selectedIndex = wardrobeEntrySelect.value;
      if (selectedIndex < 0) {
        // new item for new wardrobe
        const template = document.getElementById('wardrobeItemTemplate');
        const clone = template.content.cloneNode(true);
        wardrobeItemsContainer.appendChild(clone);
      } else {
        // new item for existing wardrobe
        const selected = wardrobeEntries[selectedIndex];
        selected.items.push({ story: selected.items[0]?.story || '', image: '', title: '', description: '', cost: 'short' });
        renderWardrobeItems(wardrobeItemsContainer, selected.items, wardrobeStoryCode.value);
      }
    }

    createWardrobeButton.onclick = async () => {
      const selectedIndex = wardrobeEntrySelect.value;
      const file = await wardrobeFileHandle.getFile();
      let fileContent = await file.text();
      const id = wardrobeId.value.trim();
      const storyCode = wardrobeStoryCode.value.trim();

      const itemBlocks = wardrobeItemsContainer.querySelectorAll('.wardrobe-item-block');
      const newItems = Array.from(itemBlocks).map(block => {
        const image = block.querySelector('.wardrobe-image').value;
        const title = block.querySelector('.wardrobe-title').value;
        const description = block.querySelector('.wardrobe-description').value;
        const cost = block.querySelector('.wardrobe-cost').value;
        return { image, title, description, cost };
      });

      const itemsCode = newItems
          .map(item => `  {\n    image: require('../../Media/Images/${storyCode}/${item.image}'),\n    title: '${item.title}',\n    description: '${item.description}',\n    cost: '${item.cost}',\n    unlocked: () => { return true }\n  }`)
          .join(',\n');

      const newEntry = `wardrobe.addEntity('${id}', [\n${itemsCode}\n])`;

      if (selectedIndex < 0) {
        fileContent += (fileContent.trim() ? '\n\n' : '') + newEntry;
      } else {
        const selected = wardrobeEntries[selectedIndex];
        fileContent = fileContent.replace(selected.original, newEntry);
      }

      const writable = await wardrobeFileHandle.createWritable();
      await writable.write(fileContent);
      await writable.close();
      alert('Файл успешно сохранен!');
      wardrobeGeneratorWindow.style.opacity = '0';
      wardrobeGeneratorWindow.style.visibility = 'hidden';
    }

    manageStat.onclick = () => {
      statsGeneratorWindow.style.opacity = '1'
      statsGeneratorWindow.style.visibility = 'visible'
    }

    statsGeneratorWindow.onclick = (e) => {
      if (e.target === statsGeneratorWindow) {
        statsGeneratorWindow.style.opacity = '0'
        statsGeneratorWindow.style.visibility = 'hidden'
      }
    }

    manageProfile.onclick = async () => {
      try {
        [profileFileHandle] = await window.showOpenFilePicker({ types: [{ description: 'JavaScript Files', accept: { 'text/javascript': ['.js', '.ts'] } }] });
        const file = await profileFileHandle.getFile();
        const fileContent = await file.text();
        const entryRegex = /{\s*id: '([^']*)',[\s\S]*?image: require\('..\/..\/Media\/Images\/([^/]+)\/([^']*)'\),[\s\S]*?condition: \(\) => achievementsManager\.isUnlocked\(EStoriesEn\.[^,]+, '([^']*)'\)[\s\S]*?}/g;
        profileEntries = [];
        const matches = [...fileContent.matchAll(entryRegex)];
        if (matches.length > 0) {
          profileEntries = matches.map((match, index) => ({
            original: match[0],
            id: match[1],
            story: match[2].trim(),
            image: match[3],
            achievement: match[4],
            index
          }));
        }
        profileEntrySelect.innerHTML = '<option value="-1">--- Создать новый элемент ---</option>' + profileEntries.map(e => `<option value="${e.index}">${e.id}</option>`).join('');
        profileEntrySelect.onchange();
        profileGeneratorWindow.style.opacity = '1';
        profileGeneratorWindow.style.visibility = 'visible';
      } catch (err) {
        if (err.name !== 'AbortError') console.error(err.name, err.message);
      }
    }

    profileGeneratorWindow.onclick = (e) => {
      if (e.target === profileGeneratorWindow) {
        profileGeneratorWindow.style.opacity = '0';
        profileGeneratorWindow.style.visibility = 'hidden';
      }
    }

  function showPrompt(message) {
    return new Promise(resolve => {
      promptLabel.textContent = message;
      promptInput.value = '';
      promptWindow.style.opacity = '1';
      promptWindow.style.visibility = 'visible';
      promptInput.focus();

      const onConfirm = () => {
        promptWindow.style.opacity = '0';
        promptWindow.style.visibility = 'hidden';
        promptConfirmButton.removeEventListener('click', onConfirm);
        document.removeEventListener('keydown', onKeydown);
        resolve(promptInput.value);
      };

      const onKeydown = (e) => {
        if (e.key === 'Enter') {
          onConfirm();
        }
      };

      promptConfirmButton.addEventListener('click', onConfirm);
      document.addEventListener('keydown', onKeydown);
    });
  }

  async function makeScenario(name, text){
    // Массив со всеми "сырыми" слайдами
    let rawSlides = text.split(/\n\n\n+/g);
    // Заготовка кода одного слайда
    const scenePrefab = '' +
      '  {' +
      '\n    id: $INDEX$,' +
      '\n    text: \n      `\n        $TEXT$\n      `, ' +
      '\n    buttons: [\n      {\n        text: \'\',\n        goTo: $INDEXPLUS$\n      }],' +
      '$MESSAGE$' +
      '$MUSIC$' +
      '$AMBIENT$' +
      '$SIMPLE$' +
      '$SPEAKER$' +
      '$SPEAKERL$' +
      '$SPEAKERR$' +
      '$PICTUREFRONT$' +
      '$PICTUREFULLSCREEN$' +
      '$PICTUREFULLSCREENL$' +
      '$PICTUREFULLSCREENR$' +
      '$PARALLAXL$' +
      '$PARALLAXR$' +
      '$CUTSCENE$' +
      '$DARKS$' +
      '$GHOSTS$' +
			'$INTERRUPTIVE$' +
			'$OKMESSAGE$' +
			'$CHAT$' +
			'$WARDROBE$' +
      '$DISABLEMUSIC$' +
      '$DISABLEAMBIENT$' +
      '$EFFECT$' +
      '\n    stats: [$STAT$$ITEM$$PERSON$$CHOICE$],' +
      '\n    achievement: $ACHIEVEMENT$' +
      '\n    imageBack: require(\'../../../../Media/Images/$NAME$/-$PICTURE$-\')' +
      '  \n  },';

    // --- Новая логика для обработки выборов ---
    const choiceStartRegex = /^! ?Начало выбора: (.*)/m;
    const choiceBranchRegex = /^! ?Выбор: (.*)/m;
    const choiceEndRegex = /^Далее/m;

    const choiceMap = new Map(); // slideIndex -> { buttons: [], endSlideIndex: -1 }
    let currentChoiceStartIndex = -1;
    const branchEndMap = new Map(); // choiceStartIndex -> last slide index of each branch

    for (let i = 0; i < rawSlides.length; i++) {
      const slideText = rawSlides[i];

      if (choiceStartRegex.test(slideText)) {
        currentChoiceStartIndex = i;
        const choices = choiceStartRegex.exec(slideText)[1].split('/').map(c => c.trim());
        choiceMap.set(i, { buttons: choices.map(c => ({ text: c, goTo: -1 })), endSlideIndex: -1, lastBranchSlide: -1 });
        branchEndMap.set(i, []);
      } else if (choiceBranchRegex.test(slideText) && currentChoiceStartIndex !== -1) {
        const branchName = choiceBranchRegex.exec(slideText)[1].trim();
        const choiceInfo = choiceMap.get(currentChoiceStartIndex);
        const button = choiceInfo.buttons.find(b => b.text === branchName);
        if (button) {
          button.goTo = i;
        }
        // The slide before this new branch was the end of the previous branch
        if (i > 0) {
          branchEndMap.get(currentChoiceStartIndex).push(i - 1);
        }
      } else if (choiceEndRegex.test(slideText) && currentChoiceStartIndex !== -1) {
        // This is the common continuation slide
        choiceMap.get(currentChoiceStartIndex).endSlideIndex = i;
        // The slide before this was the end of the last branch
        if (i > 0) {
          branchEndMap.get(currentChoiceStartIndex).push(i - 1);
        }
        currentChoiceStartIndex = -1; // Завершаем текущий блок выбора
      }
    }

    const scenes = { [name]: rawSlides.map(slide => slide.split('\n')) };
    // Сэты с уникальными названиями
    const allPictures = new Set();
    const allMusic = new Set();
    const allItems = new Set();
    const allStats = new Set();
    const allPersons = new Set();
    const allChoices = new Set();
    const allWardrobes = new Set();
    const allChats = new Set();
    const allAchievements = new Set();
    // Выводимый результат
    let result = ``;
    // Кэшируем последнюю используемую картинку
    let picture = '';
    // Проходимся по всем созданным слайдам
    for(let x = 0; x<scenes[name].length;x++){
      // Проверяем, является ли этот слайд последним в какой-либо ветке выбора
      const isBranchEnd = Array.from(branchEndMap.values()).flat().includes(x);

      // Копируем заготовку кода одного слайда
      let value = scenePrefab.slice();
      // Проходимся по всем абзацам в слайде
      for(let y =0; y<scenes[name][x].length;y++){

        if (choiceStartRegex.test(scenes[name][x][y])) {
          const choiceInfo = choiceMap.get(x);
          if (choiceInfo) {
            const buttonsCode = choiceInfo.buttons.map(b => `      {\n        text: '${b.text}',\n        goTo: ${b.goTo}\n      }`).join(',\n');
            value = value.replace(/buttons: \[\s*\{\s*text: '',\s*goTo: \$INDEXPLUS\$\s*\}\s*\]/, `buttons: [\n${buttonsCode}\n    ]`);
          }
          // Удаляем строку с директивой выбора из текста слайда
          scenes[name][x].splice(y, 1);
          y -= 1;
        } else if (choiceBranchRegex.test(scenes[name][x][y])) {
          // Удаляем строку с директивой ветки выбора
          scenes[name][x].splice(y, 1);
          y -= 1;
        } else if (choiceEndRegex.test(scenes[name][x][y])) {
          // Удаляем строку "Далее"
          scenes[name][x].splice(y, 1);
          y -= 1;
        } else if(/! Фон:* /.test(scenes[name][x][y])) {
          // Заменяем картинку пустой строкой
          scenes[name][x][y] = scenes[name][x][y].replace(/! Фон:* /, '').trim().toUpperCase();
          // Добавляем название картинки в сэт
          allPictures.add(scenes[name][x][y]);

  function hexToRgb(hex) {
    const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
